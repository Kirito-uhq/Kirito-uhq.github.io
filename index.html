<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pour toi</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>

/* ============================================================
   ZONE À PERSONNALISER — objet CONFIG en bas du <script>.
   PHOTOS : remplace <div class="photo-placeholder"> par une
   <img src="photos/xx.jpg"> à l'intérieur du .memory-photo.
   ============================================================ */

:root{
  --navy-deep:#081228;
  --navy-mid:#122140;
  --gold:#7EC8E3;
  --cream:#EAF4FB;
  --cream-dim:#9FB9D6;
  --font-display:'Cormorant Garamond', serif;
  --font-body:'Jost', sans-serif;
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  background:var(--navy-deep);
  color:var(--cream);
  font-family:var(--font-body);
  font-weight:300;
  overflow-x:hidden;
}

#stars{
  position:fixed;
  inset:0;
  z-index:0;
  pointer-events:none;
}

section{
  position:relative;
  z-index:1;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  padding:8vh 6vw;
  text-align:center;
}

/* ---------- HERO ---------- */
.hero-eyebrow{
  font-size:0.72rem;
  letter-spacing:0.32em;
  text-transform:uppercase;
  color:var(--gold);
  opacity:0;
  animation:fadeUp 1.4s ease 0.1s forwards;
  margin-bottom:1.6rem;
}
.hero h1{
  font-family:var(--font-display);
  font-style:italic;
  font-weight:500;
  font-size:clamp(2.4rem, 6.5vw, 4.2rem);
  color:var(--cream);
  opacity:0;
  animation:fadeUp 1.4s ease 0.4s forwards;
  letter-spacing:0.01em;
}
.hero p{
  margin-top:1.1rem;
  font-weight:300;
  font-size:clamp(0.95rem,1.8vw,1.1rem);
  color:var(--cream-dim);
  opacity:0;
  animation:fadeUp 1.4s ease 0.9s forwards;
  max-width:32ch;
}
.scroll-hint{
  position:absolute;
  bottom:6vh;
  font-size:0.68rem;
  letter-spacing:0.28em;
  text-transform:uppercase;
  color:var(--cream-dim);
  opacity:0;
  animation:fadeUp 1.4s ease 1.5s forwards, driftDown 2.6s ease-in-out 3s infinite;
}
@keyframes fadeUp{
  from{opacity:0; transform:translateY(18px);}
  to{opacity:1; transform:translateY(0);}
}
@keyframes driftDown{
  0%,100%{transform:translateY(0); opacity:0.55;}
  50%{transform:translateY(6px); opacity:1;}
}

/* ---------- TIMELINE ---------- */
.section-eyebrow{
  font-size:0.7rem;
  letter-spacing:0.3em;
  text-transform:uppercase;
  color:var(--gold);
  margin-bottom:0.9rem;
}
.timeline-title{
  font-family:var(--font-display);
  font-style:italic;
  font-weight:500;
  font-size:clamp(1.7rem,4vw,2.3rem);
  margin-bottom:4.5rem;
  color:var(--cream);
}
.timeline{
  width:100%;
  max-width:640px;
  display:flex;
  flex-direction:column;
  gap:3.2rem;
}
.memory{
  display:grid;
  grid-template-columns:64px 1fr;
  gap:1.4rem;
  align-items:center;
  text-align:left;
  opacity:0;
  transform:translateY(22px);
  transition:opacity 0.8s ease, transform 0.8s ease;
}
.memory.visible{opacity:1; transform:translateY(0);}

.memory-photo{
  width:64px;
  height:64px;
  border-radius:50%;
  overflow:hidden;
  border:1px solid rgba(126,200,227,0.4);
}
.photo-placeholder{
  width:100%;
  height:100%;
  background:var(--navy-mid);
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:1.3rem;
}
.memory-text .date{
  font-family:var(--font-display);
  font-style:italic;
  color:var(--gold);
  font-size:1.15rem;
  margin-bottom:0.25rem;
}
.memory-text p{
  font-weight:300;
  color:var(--cream-dim);
  font-size:0.95rem;
  line-height:1.55;
}

/* ---------- CONSTELLATION ---------- */
.constellation-wrap{
  position:relative;
  width:100%;
  max-width:420px;
  aspect-ratio:1/1;
}
#heartCanvas{width:100%; height:100%;}
.constellation-caption{
  margin-top:1.4rem;
  font-family:var(--font-display);
  font-style:italic;
  font-size:1.25rem;
  color:var(--cream-dim);
}

/* ---------- QUESTION FINALE ---------- */
.question-title{
  font-family:var(--font-display);
  font-style:italic;
  font-weight:500;
  font-size:clamp(1.7rem,4.8vw,2.8rem);
  max-width:640px;
  line-height:1.35;
  color:var(--cream);
}

@media (max-width:480px){
  .memory{grid-template-columns:52px 1fr; gap:1rem;}
  .memory-photo{width:52px; height:52px;}
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- ===== HERO ===== -->
<section class="hero">
  <div class="hero-eyebrow">Pour toi</div>
  <h1 id="heroTitle">Il y a quelque chose que je veux te dire</h1>
  <p id="heroSub">Prends un instant, ferme la porte, et lis jusqu'au bout.</p>
  <div class="scroll-hint">Continuer</div>
</section>

<!-- ===== TIMELINE ===== -->
<section>
  <div class="section-eyebrow">Souvenirs</div>
  <h2 class="timeline-title">Quelques morceaux de nous</h2>
  <div class="timeline" id="timeline"></div>
</section>

<!-- ===== CONSTELLATION ===== -->
<section>
  <div class="constellation-wrap">
    <canvas id="heartCanvas"></canvas>
  </div>
  <p class="constellation-caption">même les étoiles se sont alignées</p>
</section>

<!-- ===== QUESTION FINALE ===== -->
<section>
  <div class="section-eyebrow">La question</div>
  <h1 class="question-title" id="questionTitle"></h1>
</section>

<script>
/* ============================================================
   CONFIG — modifie uniquement cette partie pour personnaliser
   ============================================================ */
const CONFIG = {
  heroTitle: "Il y a quelque chose que je veux te dire",
  heroSub: "Prends un instant, ferme la porte, et lis jusqu'au bout.",

  memories: [
    { emoji:"☕", date:"Notre première fois", text:"Remplace ce texte par le souvenir de votre rencontre." },
    { emoji:"🌆", date:"Ce jour-là", text:"Un souvenir marquant, un fou rire, un voyage..." },
    { emoji:"🎶", date:"Notre chanson", text:"Ce qui vous appartient à vous deux." },
    { emoji:"🤍", date:"Aujourd'hui", text:"Ce que tu ressens pour elle en ce moment." }
  ],

  questionTitle: "Alors... tu es partante pour qu'on continue à écrire notre histoire, pour de vrai, tous les deux ?"
};

document.getElementById('heroTitle').textContent = CONFIG.heroTitle;
document.getElementById('heroSub').textContent = CONFIG.heroSub;
document.getElementById('questionTitle').textContent = CONFIG.questionTitle;

/* ---------- Rendu de la timeline ---------- */
const timelineEl = document.getElementById('timeline');
CONFIG.memories.forEach(m=>{
  const div = document.createElement('div');
  div.className = 'memory';
  div.innerHTML = `
    <div class="memory-photo"><div class="photo-placeholder">${m.emoji}</div></div>
    <div class="memory-text">
      <div class="date">${m.date}</div>
      <p>${m.text}</p>
    </div>`;
  timelineEl.appendChild(div);
});
const observer = new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) e.target.classList.add('visible'); });
},{threshold:0.3});
document.querySelectorAll('.memory').forEach(m=>observer.observe(m));

/* ---------- Ciel étoilé (discret) ---------- */
const starsCanvas = document.getElementById('stars');
const sctx = starsCanvas.getContext('2d');
let stars = [];
function resizeStars(){
  starsCanvas.width = window.innerWidth;
  starsCanvas.height = document.body.scrollHeight;
  stars = Array.from({length: Math.floor(window.innerWidth/9)}, ()=>({
    x: Math.random()*starsCanvas.width,
    y: Math.random()*starsCanvas.height,
    r: Math.random()*1.1+0.25,
    phase: Math.random()*Math.PI*2,
    speed: Math.random()*0.015+0.004
  }));
}
function drawStars(t){
  sctx.clearRect(0,0,starsCanvas.width,starsCanvas.height);
  stars.forEach(s=>{
    const alpha = 0.25 + 0.45*Math.sin(t*s.speed + s.phase);
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI*2);
    sctx.fillStyle = `rgba(234,244,251,${Math.max(0,alpha)})`;
    sctx.fill();
  });
  requestAnimationFrame(drawStars);
}
resizeStars();
window.addEventListener('resize', resizeStars);
requestAnimationFrame(drawStars);

/* ---------- Constellation en cœur ---------- */
const heartCanvas = document.getElementById('heartCanvas');
const hctx = heartCanvas.getContext('2d');
let heartPoints = [];
let heartDrawn = false;

function heartPos(t, scale, cx, cy){
  const x = 16*Math.pow(Math.sin(t),3);
  const y = 13*Math.cos(t) - 5*Math.cos(2*t) - 2*Math.cos(3*t) - Math.cos(4*t);
  return { x: cx + x*scale, y: cy - y*scale };
}
function setupHeart(){
  const size = heartCanvas.clientWidth;
  heartCanvas.width = size;
  heartCanvas.height = size;
  const cx = size/2, cy = size/2;
  const scale = size/38;
  heartPoints = [];
  const n = 34;
  for(let i=0;i<n;i++){
    const t = (i/n)*Math.PI*2;
    heartPoints.push(heartPos(t, scale, cx, cy));
  }
}
function animateHeart(){
  if(heartDrawn) return;
  heartDrawn = true;
  let i = 0;
  function step(){
    if(i > heartPoints.length) return;
    hctx.clearRect(0,0,heartCanvas.width,heartCanvas.height);
    hctx.strokeStyle = 'rgba(126,200,227,0.5)';
    hctx.lineWidth = 0.8;
    hctx.beginPath();
    for(let k=0;k<i;k++){
      const p = heartPoints[k];
      if(k===0) hctx.moveTo(p.x,p.y); else hctx.lineTo(p.x,p.y);
    }
    if(i>1) hctx.stroke();
    for(let k=0;k<i;k++){
      const p = heartPoints[k];
      hctx.beginPath();
      hctx.arc(p.x,p.y,1.8,0,Math.PI*2);
      hctx.fillStyle = '#EAF4FB';
      hctx.fill();
    }
    i++;
    requestAnimationFrame(step);
  }
  step();
}
setupHeart();
window.addEventListener('resize', setupHeart);
new IntersectionObserver(entries=>{
  entries.forEach(e=>{ if(e.isIntersecting) animateHeart(); });
},{threshold:0.5}).observe(heartCanvas);
</script>
</body>
</html>
